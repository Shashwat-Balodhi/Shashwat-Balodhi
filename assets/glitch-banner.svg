<svg width="1200" height="380" viewBox="0 0 1200 380" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <clipPath id="bannerClip"><rect x="0" y="0" width="1200" height="380" rx="6"/></clipPath>
    <clipPath id="asciiClip"><rect x="140" y="44" width="320" height="240"/></clipPath>
    <clipPath id="slice1"><rect x="140" y="96" width="320" height="9"/></clipPath>
    <clipPath id="slice2"><rect x="140" y="150" width="320" height="7"/></clipPath>
    <clipPath id="slice3"><rect x="140" y="200" width="320" height="10"/></clipPath>
    <clipPath id="slice4"><rect x="140" y="240" width="320" height="6"/></clipPath>

    <pattern id="guilloche" width="42" height="42" patternUnits="userSpaceOnUse" patternTransform="rotate(12)">
      <path d="M0 21 Q10.5 0 21 21 T42 21" fill="none" stroke="#0aff66" stroke-opacity="0.35" stroke-width="0.6"/>
      <path d="M0 0 Q10.5 21 21 0 T42 0" fill="none" stroke="#ff2b4d" stroke-opacity="0.22" stroke-width="0.6"/>
    </pattern>

    <pattern id="microprint" width="120" height="14" patternUnits="userSpaceOnUse">
      <text x="0" y="10" font-family="Courier New, monospace" font-size="8" letter-spacing="1" fill="#0aff66" opacity="0.55">AI-ENGINEER * DO NOT COPY * </text>
    </pattern>

    <linearGradient id="sheen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="45%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#9be8ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>

    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff66" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff66" stop-opacity="0.16"/>
      <stop offset="100%" stop-color="#00ff66" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      .mono { font-family: 'Courier New', Consolas, monospace; }
      .ascii { font-family: 'Courier New', Consolas, monospace; font-size: 5px; fill: currentColor; }
      .flicker { animation: flick 4.2s infinite steps(1); }
      @keyframes flick {
        0%, 91%, 95%, 100% { opacity: 1; }
        92% { opacity: 0.35; }
        93% { opacity: 0.85; }
        94% { opacity: 0.5; }
      }
      .cursor { animation: blink 1s steps(1) infinite; }
      @keyframes blink { 0%,49% { opacity:1; } 50%,100% { opacity:0; } }
      .stamp { transform-origin: 430px 280px; animation: spinSlow 14s linear infinite; }
      @keyframes spinSlow { from { transform: rotate(0deg);} to { transform: rotate(360deg);} }
      .jitterR { animation: jitR 2.6s infinite steps(6); }
      @keyframes jitR {
        0%   { transform: translate(0,0); }
        15%  { transform: translate(-2px,0); }
        30%  { transform: translate(1px,1px); }
        45%  { transform: translate(0,0); }
        60%  { transform: translate(-1px,-1px); }
        75%  { transform: translate(2px,0); }
        100% { transform: translate(0,0); }
      }
      .jitterC { animation: jitC 3.1s infinite steps(6); }
      @keyframes jitC {
        0%   { transform: translate(0,0); }
        20%  { transform: translate(2px,0); }
        35%  { transform: translate(-1px,1px); }
        50%  { transform: translate(0,0); }
        65%  { transform: translate(1px,-1px); }
        80%  { transform: translate(-2px,0); }
        100% { transform: translate(0,0); }
      }
      .sliceA { animation: slA 3.4s infinite; }
      @keyframes slA {
        0%, 38%, 44%, 100% { opacity: 0; transform: translate(0,0); }
        40% { opacity: 0.9; transform: translate(10px,0); }
        42% { opacity: 0.9; transform: translate(-8px,0); }
      }
      .sliceB { animation: slB 4.1s infinite; }
      @keyframes slB {
        0%, 60%, 66%, 100% { opacity: 0; transform: translate(0,0); }
        62% { opacity: 0.85; transform: translate(-12px,0); }
        64% { opacity: 0.85; transform: translate(9px,0); }
      }
    </style>
  </defs>

  <g clip-path="url(#bannerClip)">
    <rect x="0" y="0" width="1200" height="380" fill="#03080a"/>

    <g stroke="#0aff66" stroke-opacity="0.06" stroke-width="1">
      <path d="M0 0 V380 M60 0 V380 M120 0 V380 M180 0 V380 M240 0 V380 M300 0 V380 M360 0 V380 M420 0 V380 M480 0 V380 M540 0 V380 M600 0 V380 M660 0 V380 M720 0 V380 M780 0 V380 M840 0 V380 M900 0 V380 M960 0 V380 M1020 0 V380 M1080 0 V380 M1140 0 V380 M1200 0 V380"/>
      <path d="M0 0 H1200 M0 40 H1200 M0 80 H1200 M0 120 H1200 M0 160 H1200 M0 200 H1200 M0 240 H1200 M0 280 H1200 M0 320 H1200 M0 360 H1200"/>
    </g>

    <!-- matrix rain, background decoration in right half only -->
    <g class="mono" font-size="16" fill="#0aff66" opacity="0.35">
      <text x="1120" y="-30"><animate attributeName="y" from="-40" to="420" dur="2.8s" begin="0.2s" repeatCount="indefinite"/>&#65395;</text>
      <text x="700" y="-70"><animate attributeName="y" from="-40" to="420" dur="3.3s" begin="0.6s" repeatCount="indefinite"/>11</text>
      <text x="1160" y="-50"><animate attributeName="y" from="-40" to="420" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>&#65396;</text>
      <text x="620" y="-80"><animate attributeName="y" from="-40" to="420" dur="3.9s" begin="0.3s" repeatCount="indefinite"/>00</text>
      <text x="1080" y="-40"><animate attributeName="y" from="-40" to="420" dur="3.0s" begin="1.4s" repeatCount="indefinite"/>&#65392;</text>
    </g>

