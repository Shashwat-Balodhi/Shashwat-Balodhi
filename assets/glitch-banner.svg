    <g>
      <rect x="110" y="20" width="380" height="340" fill="url(#guilloche)"/>
      <rect x="110" y="20" width="380" height="340" fill="none" stroke="#0aff66" stroke-opacity="0.5" stroke-width="1"/>

      <rect x="110" y="20" width="380" height="16" fill="url(#microprint)"/>
      <rect x="110" y="344" width="380" height="16" fill="url(#microprint)"/>

      <text x="140" y="33" class="mono" font-size="11" letter-spacing="2" fill="#0aff66" opacity="0.9">IDENTIFICATION // DATA PAGE</text>

      <rect x="140" y="44" width="320" height="240" fill="#060b06" stroke="#0aff66" stroke-width="2"/>
      <g clip-path="url(#asciiClip)">
        <use href="#asciiArt" xlink:href="#asciiArt" style="color:#ff2b4d" opacity="0.55" class="jitterR"/>
        <use href="#asciiArt" xlink:href="#asciiArt" style="color:#00e5ff" opacity="0.55" class="jitterC"/>
        <use href="#asciiArt" xlink:href="#asciiArt" style="color:#0aff66" class="flicker"/>

        <!-- holographic sheen -->
        <rect x="-260" y="0" width="180" height="300" fill="url(#sheen)" transform="skewX(-20)">
          <animate attributeName="x" from="-260" to="360" dur="3.6s" repeatCount="indefinite"/>
        </rect>
      </g>

      <!-- glitch slice displacement bars -->
      <g clip-path="url(#slice1)"><use href="#asciiArt" xlink:href="#asciiArt" x="0" y="0" style="color:#ffffff" class="sliceA"/></g>
      <g clip-path="url(#slice3)"><use href="#asciiArt" xlink:href="#asciiArt" x="0" y="0" style="color:#ff2b4d" class="sliceB"/></g>

      <rect x="140" y="44" width="320" height="240" fill="none" stroke="#0aff66" stroke-width="2"/>

      <path d="M140 44 L140 32 L152 32" stroke="#ff2b4d" stroke-width="2" fill="none"/>
      <path d="M460 44 L460 32 L448 32" stroke="#ff2b4d" stroke-width="2" fill="none"/>
      <path d="M140 284 L140 296 L152 296" stroke="#ff2b4d" stroke-width="2" fill="none"/>
      <path d="M460 284 L460 296 L448 296" stroke="#ff2b4d" stroke-width="2" fill="none"/>

      <g class="stamp" filter="url(#glow)">
        <circle cx="430" cy="280" r="24" fill="#03080a" fill-opacity="0.55" stroke="#ff2b4d" stroke-width="1.5" stroke-dasharray="3 3"/>
        <text class="mono" font-size="6.5" fill="#ff2b4d">
          <textPath href="#sealPath" xlink:href="#sealPath" startOffset="0">&#8226; VERIFIED &#8226; VERIFIED &#8226; VERIFIED &#8226;</textPath>
        </text>
      </g>
      <path id="sealPath" d="M 430,280 m -21,0 a 21,21 0 1,1 42,0 a 21,21 0 1,1 -42,0" fill="none"/>
      <text x="430" y="285" text-anchor="middle" class="mono" font-size="14" fill="#ff2b4d" font-weight="bold">AI</text>

      <text x="127" y="284" class="mono" font-size="10" fill="#0aff66" opacity="0.8" transform="rotate(-90 127 284)">SN// 0X118597613-IND</text>

      <g class="mono" font-size="10.5" letter-spacing="0.3" fill="#0aff66">
        <text x="140" y="316">P&lt;AIX BALODHI&lt;&lt;SHASHWAT&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;&lt;</text>
        <text x="140" y="328">1185976134AIX0000000M3001019ENGR&lt;&lt;06</text>
      </g>
    </g>

    <!-- ===== RIGHT HALF (center x=900): NAME / STATUS, all centered ===== -->
    <g class="mono" text-anchor="middle">
      <g font-size="42" font-weight="bold">
        <text x="898" y="130" fill="#ff2b4d" opacity="0.7">
          SHASHWAT BALODHI
          <animate attributeName="x" values="898;894;902;898" keyTimes="0;0.9;0.95;1" dur="3.4s" repeatCount="indefinite"/>
        </text>
        <text x="902" y="130" fill="#00e5ff" opacity="0.7">
          SHASHWAT BALODHI
          <animate attributeName="x" values="902;907;899;902" keyTimes="0;0.9;0.95;1" dur="3.7s" repeatCount="indefinite"/>
        </text>
        <text x="900" y="130" fill="#eafff2" class="flicker">SHASHWAT BALODHI</text>
      </g>

      <text x="900" y="168" font-size="19" fill="#0aff66">&gt; AI_ENGINEER // NEURAL_SYSTEMS_LAB</text>
      <text x="900" y="196" font-size="19" fill="#7dffa8" opacity="0.85">STATUS: <tspan fill="#0aff66">ONLINE</tspan><tspan class="cursor">_</tspan></text>

      <text x="900" y="234" font-size="12.5" fill="#0aff66" opacity="0.55">root@shashwat:~$ ./deploy_intelligence --mode=production</text>
      <text x="900" y="253" font-size="12.5" fill="#0aff66" opacity="0.55">[OK] LLM_CORE [OK] RAG_ENGINE [OK] VISION_STACK [OK] MLOPS_PIPELINE</text>

      <g font-size="12" fill="#0aff66" opacity="0.75">
        <text x="900" y="288">DESIGNATION.......: AI/ML ENGINEER</text>
        <text x="900" y="306">CLEARANCE LEVEL...: PRODUCTION</text>
        <text x="900" y="324">ISSUED............: VIT BHOPAL // 2022</text>
        <text x="900" y="342">DOC ID............: GH-118597613</text>
      </g>
    </g>

    <rect x="0" y="0" width="1200" height="60" fill="url(#scanGrad)">
      <animate attributeName="y" from="-60" to="380" dur="4s" repeatCount="indefinite"/>
    </rect>

    <rect x="0" y="0" width="1200" height="380" fill="url(#vignette)"/>
    <rect x="1" y="1" width="1198" height="378" fill="none" stroke="#0aff66" stroke-opacity="0.4" stroke-width="2"/>
  </g>
</svg>
