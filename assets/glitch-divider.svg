<svg width="1200" height="40" viewBox="0 0 1200 40" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0aff66" stop-opacity="0"/>
      <stop offset="50%" stop-color="#0aff66" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0aff66" stop-opacity="0"/>
    </linearGradient>
    <style>
      .tick { animation: pulse 1.6s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { opacity: 0.25; } 50% { opacity: 1; } }
    </style>
  </defs>
  <rect x="0" y="18" width="1200" height="2" fill="#0aff66" opacity="0.15"/>
  <rect x="-300" y="17" width="300" height="4" fill="url(#sweep)">
    <animate attributeName="x" from="-300" to="1200" dur="3.2s" repeatCount="indefinite"/>
  </rect>
  <g fill="#ff2b4d">
    <rect x="120" y="14" width="4" height="12" class="tick" style="animation-delay:0s"/>
    <rect x="420" y="14" width="4" height="12" class="tick" style="animation-delay:0.4s"/>
    <rect x="720" y="14" width="4" height="12" class="tick" style="animation-delay:0.8s"/>
    <rect x="1020" y="14" width="4" height="12" class="tick" style="animation-delay:1.2s"/>
  </g>
</svg>
